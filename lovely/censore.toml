[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
    if self.sticker or ((self.sticker_run and self.sticker_run~='NONE') and G.SETTINGS.run_stake_stickers)  then loc_vars = loc_vars or {}; loc_vars.sticker=(self.sticker or self.sticker_run) end
'''
position = "after"
payload = '''
    local censor = {}
    local do_censor
    if loc_vars then
        for k, v in pairs(loc_vars) do
            censor[k] = "[?]"
        end
    end
    for k, v in pairs(SMODS.find_card("j_jand_redacted")) do
        if v.area == G.jokers or G.consumeables then
            do_censor = true
        end
    end
    if next(censor) and do_censor then
        loc_vars = censor
    end
'''
match_indent = true