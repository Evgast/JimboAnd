[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
    local _can_continue = G.MAIN_MENU_UI and G.FUNCS.can_continue({config = {func = true}})
'''
position = "after"
payload = '''
    if G.beanies_tutor then
        _can_continue = false
    end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
    chosen = (not _challenge_chosen) and (not _can_continue),
'''
position = "after"
payload = '''
    chosen = (not _challenge_chosen) and (not _can_continue) and not G.beanies_tutor,
'''
match_indent = true


[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
        tab_definition_function_args = 'New Run'
    },
'''
position = "after"
payload = '''
    {
        label = localize('b_lab'),
        chosen = G.beanies_tutor,
        tab_definition_function = G.UIDEF.beta_choice,
        tab_definition_function_args = 'Lab'
    },
'''
match_indent = true
